<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Bukti Pembayaran Resmi - VillaStay</title>
    <style>
        body { background: #e0e0e0; font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; }
        .kertas-kuitansi { 
            background: #fff; width: 450px; margin: 30px auto; padding: 40px; 
            border: 1px solid #ccc; box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        .header-bukti { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .header-bukti h2 { margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .info { margin: 20px 0; }
        .baris { display: flex; justify-content: space-between; margin: 10px 0; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .total-box { margin-top: 20px; background: #333; color: white; padding: 15px; text-align: center; font-size: 18px; font-weight: bold; }
        .status { text-align: center; font-weight: bold; margin: 25px 0; color: #28a745; border: 2px solid #28a745; padding: 8px; }
        .footer-bukti { font-size: 11px; text-align: center; color: #666; margin-top: 30px; }
        .tombol-cetak { display: block; width: 450px; margin: 20px auto; padding: 15px; background: #222; color: white; border: none; cursor: pointer; border-radius: 5px; }
        @media print { .tombol-cetak { display: none; } body { background: white; } }
    </style>
</head>
<body>

<div class="kertas-kuitansi">
    <div class="header-bukti">
        <h2>VillaStay</h2>
        <p style="font-size: 12px;">Bukti Reservasi Resmi</p>
    </div>
    
    <div class="info">
        <div class="baris"><span>ID Booking:</span> <b>VST-2026-X892</b></div>
        <div class="baris"><span>Nama:</span> <b id="out-nama">-</b></div>
        <div class="baris"><span>Villa:</span> <b id="out-villa">-</b></div>
        <div class="baris"><span>Check-In:</span> <b id="out-in">-</b></div>
        <div class="baris"><span>Check-Out:</span> <b id="out-out">-</b></div>
    </div>

    <div class="total-box">
        TOTAL BAYAR: <span id="out-total">Rp 0</span>
    </div>

    <div class="status">STATUS: LUNAS & TERPESAN</div>
    
    <div class="footer-bukti">
        <p>Terima kasih telah memilih VillaStay. Simpan bukti ini untuk proses check-in.</p>
    </div>
</div>

<button class="tombol-cetak" onclick="window.print()">CETAK BUKTI INI</button>

<script>
    // Mengambil data dari URL yang dikirim oleh booking.html
    document.addEventListener("DOMContentLoaded", function () {
        const urlParams = new URLSearchParams(window.location.search);
        
        document.getElementById('out-nama').textContent = urlParams.get('nama') || "-";
        document.getElementById('out-villa').textContent = urlParams.get('villa') || "-";
        document.getElementById('out-in').textContent = urlParams.get('checkin') || "-";
        document.getElementById('out-out').textContent = urlParams.get('checkout') || "-";
        document.getElementById('out-total').textContent = urlParams.get('total_harga') || "Rp 0";
    });
</script>
</body>
</html>
