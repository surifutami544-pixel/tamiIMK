<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Pemesanan Villa - VillaStay</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* Style Khusus Form Booking agar Rapi & Elegan */
    .booking-container {
      max-width: 700px;
      margin: 40px auto;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.05);
      border: 1px solid #eee;
    }
    .form-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .form-group {
      flex: 1;
      min-width: 250px;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .form-group label {
      font-weight: 600;
      color: #333;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }
    /* Style khusus kotak input voucher promo */
    .promo-input-wrapper {
      background: #f1f3f5;
      padding: 15px;
      border-radius: 8px;
      border: 1px dashed #ced4da;
      margin-bottom: 25px;
    }
  </style>
</head>
<script src="script.js" defer></script>
<body>

  <header>
    <div class="header-container">
      <div class="logo"><span class="logo-circle"></span> VillaStay</div>
      <nav>
        <ul>
          <li><a href="index.html">Beranda</a></li>
          <li><a href="villa.html">Villa</a></li>
          <li><a href="fasilitas.html">Fasilitas</a></li>
          <li><a href="destinasi.html">Destinasi</a></li>
          <li><a href="tentang-kami.html">Tentang Kami</a></li>
          <li><a href="kontak.html">Kontak</a></li>
        </ul>
      </nav>
      <a href="booking.html" class="btn-pesan active">Pesan Sekarang</a>
    </div>
  </header>

  <section class="main-section" style="padding: 40px 20px;">
    <div class="section-title" style="text-align: center; margin-bottom: 30px;">
      <h2>Formulir Pemesanan Villa</h2>
      <p>Lengkapi data diri Anda untuk mengonfirmasi reservasi unit villa di VillaStay</p>
    </div>

    <div class="booking-container">
      <form id="mainBookingForm" action="bukti-sewa.html" method="GET">
    
    <div class="form-group">
        <label><i class="fa-solid fa-user"></i> Nama Lengkap</label>
        <input type="text" name="nama" id="booking-nama" placeholder="Masukkan nama sesuai KTP" required>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label><i class="fa-solid fa-envelope"></i> Email Aktif</label>
            <input type="email" name="email" placeholder="nama@email.com" required>
        </div>
        <div class="form-group">
            <label><i class="fa-solid fa-phone"></i> Nomor WhatsApp</label>
            <input type="tel" name="whatsapp" placeholder="Contoh: 08123456xxx" required>
        </div>
    </div>

    <div class="form-group">
        <label><i class="fa-solid fa-hotel"></i> Pilih Unit Villa</label>
        <select name="villa" id="booking-villa" required>
            <option value="">-- Pilih Villa Anda --</option>
            <option value="Villa Ocean View">Villa Ocean View (Uluwatu)</option>
            <option value="Villa Sunset Paradise">Villa Sunset Paradise (Canggu)</option>
            <option value="Villa Green Escape">Villa Green Escape (Ubud)</option>
            <option value="Villa Serenity">Villa Serenity (Seminyak)</option>
        </select>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label><i class="fa-solid fa-calendar-import"></i> Tanggal Check-In</label>
            <input type="date" name="checkin" required>
        </div>
        <div class="form-group">
            <label><i class="fa-solid fa-calendar-export"></i> Tanggal Check-Out</label>
            <input type="date" name="checkout" required>
        </div>
        <div class="form-group" id="section-promo-booking" style="display: none;">
    <label for="kode-voucher-booking">Kode Voucher</label>
    <input type="text" name="promo" id="kode-voucher-booking" placeholder="Masukkan kode promo">
</div>
<div id="price-display">
          <p>Harga Normal: <span id="harga-asli" style="text-decoration: line-through; color: #777;">Rp 0</span></p>
          <p>Harga Total: <strong id="harga-promo" style="color: #d9534f; font-size: 20px;">Rp 0</strong></p>
        </div>
    </div>

    <button type="submit" class="btn-pesan" style="width: 100%; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 16px;">Konfirmasi & Dapatkan Bukti Sewa</button>
  </form>
    </div>
  </section>

  <footer>
    <div class="footer-bottom" style="text-align: center; padding: 20px; background: #333; color: #fff;">
      <p>&copy; 2026 VillaStay. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
